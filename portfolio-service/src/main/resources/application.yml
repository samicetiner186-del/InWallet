server:
  port: 8080

spring:
  application:
    name: portfolio-service
  datasource:
    url: jdbc:postgresql://localhost:5432/wallet_db
    username: user
    password: password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
